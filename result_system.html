<!DOCTYPE html>
<html>
<head>
<title>Result System</title>

<script>
function calc() {
    let p1 = Number(document.getElementById("p1").value);
    let p2 = Number(document.getElementById("p2").value);
    let p3 = Number(document.getElementById("p3").value);
    let p4 = Number(document.getElementById("p4").value);
    let p5 = Number(document.getElementById("p5").value);
    let p6 = Number(document.getElementById("p6").value);

    let total = p1 + p2 + p3 + p4 + p5 + p6;
    let avg = total / 6;

    document.getElementById("total").value = total;
    document.getElementById("avg").value = avg;

    if (avg >= 60) {
        document.getElementById("result").value = "Pass";
    } else {
        document.getElementById("result").value = "Fail";
    }
}
</script>

</head>

<body>

<h2>Result Evaluation System</h2>

P1: <input id="p1" type="number"><br>
P2: <input id="p2" type="number"><br>
P3: <input id="p3" type="number"><br>
P4: <input id="p4" type="number"><br>
P5: <input id="p5" type="number"><br>
P6: <input id="p6" type="number"><br><br>

<button onclick="calc()">Submit</button><br><br>

Total: <input id="total"><br>
Average: <input id="avg"><br>
Result: <input id="result"><br>

</body>
</html>
