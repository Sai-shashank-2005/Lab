<!DOCTYPE html>
<html>

<head>
<title>Result System</title>

<style>
body {
  margin: 60px 200px;
  background-color: grey;
  color: beige;
  font-weight: bold;
  font-family: Lucida;
  text-align: center;
}
</style>

<script>

function Calc() {

  let a1 = parseFloat(document.getElementById('p1').value);
  let a2 = parseFloat(document.getElementById('p2').value);
  let a3 = parseFloat(document.getElementById('p3').value);
  let a4 = parseFloat(document.getElementById('p4').value);
  let a5 = parseFloat(document.getElementById('p5').value);
  let a6 = parseFloat(document.getElementById('p6').value);

  if (isNaN(a1) || isNaN(a2) || isNaN(a3) || isNaN(a4) || isNaN(a5) || isNaN(a6)) {
    alert("Please enter all marks!");
    return;
  }

  let total = a1 + a2 + a3 + a4 + a5 + a6;
  let average = total / 6;

  let check = prompt("Shall it continue? (yes/no)");

  if (check && check.toLowerCase() === "yes") {

    document.getElementById('totM').value = total;
    document.getElementById('avgM').value = average.toFixed(2);

    if (average > 60) {
      document.getElementById('res').value = "Pass";
    } else {
      document.getElementById('res').value = "Fail";
    }

  } else {
    alert("Cancelled");
  }
}

</script>

</head>

<body>

<form>

<h1>Welcome to the Result Evaluation System</h1>

Enter the Details of the student:<br/><br/>

Course:
<input list="course" id="good"/>
<datalist id="course">
  <option value="Mtech">
  <option value="MCA">
</datalist>
<br/>

Regno.: <input id="regno" type="text"><br/>
Name: <input id="sname" type="text"><br/><br/>

Enter the Subject Marks:<br/>

P1 = <input id="p1" type="number"><br/>
P2 = <input id="p2" type="number"><br/>
P3 = <input id="p3" type="number"><br/>
P4 = <input id="p4" type="number"><br/>
P5 = <input id="p5" type="number"><br/>
P6 = <input id="p6" type="number"><br/><br/>

<input type="button" onclick="Calc()" value="Submit">
<input type="button" onclick="window.print()" value="Print">

<br/><br/>

TOTAL MARKS: <input id="totM" type="number"><br/>
PERCENTAGE %: <input id="avgM" type="number"><br/><br/>

Result: <input id="res" type="text"><br/>

</form>

</body>
</html>
