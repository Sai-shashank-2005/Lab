
<html>

<head>
  <title>Payroll System</title>
</head>

<body>

<h3>Payroll System</h3>

Employee Name:
<input type="text" id="name"><br><br>

Designation:
<input list="roles" id="role">
<datalist id="roles">
  <option value="MD">
  <option value="HR">
  <option value="TL">
  <option value="TM">
</datalist><br><br>

Days Worked:
<input type="number" id="days"><br><br>

<button onclick="calc()">Calculate</button>

<p id="result"></p>

<script>
function calc() {

  let name = document.getElementById("name").value;
  let role = document.getElementById("role").value;
  let days = parseInt(document.getElementById("days").value);

  if (!name || !role || isNaN(days)) {
    alert("Fill all fields!");
    return;
  }

  let pay = {
    MD: 2350,
    HR: 1400,
    TL: 700,
    TM: 300
  };

  if (!pay[role]) {
    alert("Invalid role!");
    return;
  }

  let salary = pay[role] * days;

  document.getElementById("result").innerHTML =
    "Name: " + name + "<br>Salary: ₹ " + salary;
}
</script>

</body>
</html>
