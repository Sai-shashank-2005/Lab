<!DOCTYPE html>
<html>

<head>
  <title>Payroll</title>
</head>

<body>

<h3>Payroll</h3>

Name:
<input type="text" id="n"><br><br>

Role:
<input list="r" id="d">
<datalist id="r">
  <option value="MD">
  <option value="HR">
  <option value="TL">
  <option value="TM">
</datalist><br><br>

Days:
<input type="number" id="dy"><br><br>

<button onclick="c()">Calc</button>

<p id="o"></p>

<script>
function c() {

  var n = document.getElementById("n").value;
  var d = document.getElementById("d").value;
  var dy = document.getElementById("dy").value;

  if (n=="" || d=="" || dy=="") {
    alert("Fill all");
    return;
  }

  var s = 0;

  if (d=="MD") s = 2350 * dy;
  else if (d=="HR") s = 1400 * dy;
  else if (d=="TL") s = 700 * dy;
  else if (d=="TM") s = 300 * dy;
  else {
    alert("Wrong role");
    return;
  }

  document.getElementById("o").innerHTML =
    "Name: " + n + "<br>Salary: ₹ " + s;
}
</script>

</body>
</html>
